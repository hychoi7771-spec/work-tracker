<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>업무 진행 현황표</title>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
<style>
:root {
  --primary: #a8d8b9;
  --primary-light: #d4eddd;
  --secondary: #f5c6d0;
  --secondary-light: #fce4e8;
  --accent: #c5b8e8;
  --accent-light: #e8e2f8;
  --warning: #f9e4b7;
  --warning-dark: #e8c96a;
  --danger: #f5b8b8;
  --info: #b8d8f5;
  --bg: #f4f7f5;
  --sidebar-bg: #ffffff;
  --card-bg: #ffffff;
  --text: #3d4a42;
  --text-light: #7a8c80;
  --border: #e0ebe4;
  --shadow: 0 2px 12px rgba(100,140,110,0.08);
  --radius: 14px;
  --radius-sm: 8px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: var(--bg); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

/* ── 사이드바 ── */
#sidebar {
  width: 220px; min-width: 220px; background: var(--sidebar-bg);
  border-right: 1px solid var(--border); display: flex; flex-direction: column;
  padding: 24px 0; transition: width .3s, transform .3s; z-index: 100; overflow: hidden;
}
#sidebar.collapsed { width: 64px; min-width: 64px; }
.sidebar-logo { padding: 0 20px 24px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border); }
.sidebar-logo .logo-icon { width: 36px; height: 36px; background: var(--primary); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.sidebar-logo .logo-text { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; }
#sidebar.collapsed .logo-text, #sidebar.collapsed .nav-label, #sidebar.collapsed .sidebar-footer-label { display: none; }
.nav-menu { flex: 1; padding: 16px 0; }
.nav-item { display: flex; align-items: center; gap: 12px; padding: 11px 20px; cursor: pointer; border-radius: 0; transition: background .2s; color: var(--text-light); font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; }
.nav-item:hover { background: var(--primary-light); color: var(--text); }
.nav-item.active { background: var(--primary-light); color: #2d6e4a; font-weight: 700; border-right: 3px solid var(--primary); }
.nav-icon { font-size: 18px; flex-shrink: 0; width: 24px; text-align: center; }
.sidebar-footer { padding: 16px 20px 0; border-top: 1px solid var(--border); }
.collapse-btn { display: flex; align-items: center; gap: 10px; cursor: pointer; color: var(--text-light); font-size: 13px; padding: 8px 0; }
.collapse-btn:hover { color: var(--text); }

/* ── 메인 ── */
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar { display: flex; align-items: center; gap: 12px; padding: 16px 24px; background: #fff; border-bottom: 1px solid var(--border); }
.topbar-title { font-size: 18px; font-weight: 700; flex: 1; }
.topbar-actions { display: flex; gap: 8px; }
.content { flex: 1; overflow-y: auto; padding: 24px; }

/* ── 버튼 ── */
.btn { padding: 8px 16px; border-radius: var(--radius-sm); border: none; cursor: pointer; font-size: 13px; font-weight: 600; display: inline-flex; align-items: center; gap: 6px; transition: opacity .2s, transform .1s; }
.btn:hover { opacity: .88; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn-primary { background: var(--primary); color: #2d5e3e; }
.btn-secondary { background: var(--secondary); color: #7a3040; }
.btn-accent { background: var(--accent); color: #4a3070; }
.btn-warning { background: var(--warning); color: #7a5a10; }
.btn-danger { background: var(--danger); color: #8b2020; }
.btn-ghost { background: transparent; color: var(--text-light); border: 1px solid var(--border); }
.btn-sm { padding: 5px 10px; font-size: 12px; }
.btn-icon { padding: 8px; border-radius: var(--radius-sm); background: transparent; border: 1px solid var(--border); cursor: pointer; font-size: 16px; transition: background .2s; }
.btn-icon:hover { background: var(--primary-light); }

/* ── 카드 ── */
.card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }
.stat-card { background: var(--card-bg); border-radius: var(--radius); padding: 18px 20px; box-shadow: var(--shadow); display: flex; flex-direction: column; gap: 6px; border-left: 4px solid; }
.stat-card.total { border-color: var(--accent); }
.stat-card.doing { border-color: var(--primary); }
.stat-card.done { border-color: #7ecf9a; }
.stat-card.late { border-color: var(--danger); }
.stat-card.review { border-color: var(--warning-dark); }
.stat-label { font-size: 12px; color: var(--text-light); font-weight: 600; }
.stat-value { font-size: 28px; font-weight: 800; color: var(--text); }
.stat-sub { font-size: 11px; color: var(--text-light); }

/* ── 차트 그리드 ── */
.chart-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 24px; }
.chart-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
.chart-title { font-size: 14px; font-weight: 700; margin-bottom: 14px; color: var(--text); }
.chart-wrap { position: relative; height: 200px; }

/* ── 업무 테이블 ── */
.filter-bar { display: flex; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
.filter-bar input, .filter-bar select { padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 13px; background: #fff; color: var(--text); }
.filter-bar input { min-width: 200px; }
.task-table-wrap { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead { background: var(--primary-light); }
th { padding: 12px 14px; text-align: left; font-weight: 700; color: var(--text); font-size: 12px; white-space: nowrap; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafffe; }
.progress-bar-wrap { width: 80px; background: var(--border); border-radius: 10px; height: 8px; overflow: hidden; }
.progress-bar-fill { height: 100%; border-radius: 10px; background: var(--primary); transition: width .3s; }

/* ── 뱃지 ── */
.badge { display: inline-flex; align-items: center; padding: 3px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; white-space: nowrap; }
.badge-wait { background: #e8eef2; color: #5a7080; }
.badge-doing { background: var(--primary-light); color: #2d6e4a; }
.badge-review { background: var(--warning); color: #7a5a10; }
.badge-done { background: #d4f0de; color: #1a6e3a; }
.badge-high { background: var(--secondary-light); color: #8b2040; }
.badge-urgent { background: var(--danger); color: #8b2020; }
.badge-normal { background: #e8f0ff; color: #3050a0; }
.badge-low { background: #f0f0f0; color: #606060; }
.badge-tag { background: var(--accent-light); color: #4a3070; font-size: 10px; padding: 2px 7px; }
.dday { font-size: 11px; font-weight: 700; }
.dday-late { color: #d04040; }
.dday-soon { color: #d08040; }
.dday-ok { color: #40a060; }
.dday-today { color: #a040c0; }

/* ── 간트차트 ── */
.gantt-wrap { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); overflow: auto; }
.gantt-header { display: flex; border-bottom: 1px solid var(--border); background: var(--primary-light); }
.gantt-task-col { width: 200px; min-width: 200px; padding: 10px 14px; font-size: 12px; font-weight: 700; border-right: 1px solid var(--border); }
.gantt-days { display: flex; flex: 1; }
.gantt-day { flex: 1; min-width: 30px; padding: 10px 4px; font-size: 11px; font-weight: 600; text-align: center; border-right: 1px solid var(--border); color: var(--text-light); }
.gantt-day.today { background: var(--secondary-light); color: #8b2040; }
.gantt-row { display: flex; border-bottom: 1px solid var(--border); min-height: 44px; }
.gantt-row:hover { background: #f8fff8; }
.gantt-task-name { width: 200px; min-width: 200px; padding: 10px 14px; font-size: 12px; border-right: 1px solid var(--border); display: flex; align-items: center; gap: 6px; }
.gantt-timeline { flex: 1; position: relative; }
.gantt-bar { position: absolute; height: 22px; top: 50%; transform: translateY(-50%); border-radius: 6px; opacity: .85; display: flex; align-items: center; padding: 0 8px; font-size: 11px; color: #fff; font-weight: 600; white-space: nowrap; overflow: hidden; min-width: 4px; cursor: pointer; }
.gantt-bar:hover { opacity: 1; }

/* ── 캘린더 ── */
.calendar-nav { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.calendar-nav h3 { font-size: 16px; font-weight: 700; flex: 1; text-align: center; }
.calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
.cal-day-header { padding: 8px 4px; text-align: center; font-size: 12px; font-weight: 700; color: var(--text-light); }
.cal-day-header:first-child { color: #d04040; }
.cal-day-header:last-child { color: #4060d0; }
.cal-cell { background: var(--card-bg); border-radius: var(--radius-sm); min-height: 90px; padding: 6px; border: 1px solid var(--border); }
.cal-cell.other-month { opacity: .4; }
.cal-cell.today { border: 2px solid var(--primary); }
.cal-date { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
.cal-task-item { font-size: 10px; border-radius: 4px; padding: 2px 5px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; cursor: pointer; }

/* ── 팀 관리 ── */
.team-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; }
.team-card { background: var(--card-bg); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; text-align: center; }
.team-avatar { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; margin: 0 auto 12px; font-weight: 700; color: #fff; }
.team-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.team-role { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.team-stats { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }

/* ── 태그 관리 ── */
.tag-list { display: flex; flex-wrap: wrap; gap: 8px; }
.tag-item { display: inline-flex; align-items: center; gap: 6px; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; }
.tag-del { opacity: .6; font-size: 14px; }
.tag-del:hover { opacity: 1; }

/* ── 모달 ── */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(50,70,60,.35); z-index: 1000; align-items: center; justify-content: center; }
.modal-overlay.open { display: flex; }
.modal { background: #fff; border-radius: var(--radius); box-shadow: 0 8px 40px rgba(50,100,70,.18); padding: 28px; width: 580px; max-width: 96vw; max-height: 90vh; overflow-y: auto; }
.modal-sm { width: 380px; }
.modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.modal-header h3 { font-size: 17px; font-weight: 800; }
.modal-close { background: none; border: none; font-size: 22px; cursor: pointer; color: var(--text-light); line-height: 1; }
.modal-close:hover { color: var(--text); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.form-group { display: flex; flex-direction: column; gap: 6px; }
.form-group.full { grid-column: 1 / -1; }
.form-group label { font-size: 12px; font-weight: 700; color: var(--text-light); }
.form-group input, .form-group select, .form-group textarea {
  padding: 9px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-size: 13px; color: var(--text); background: #fff; font-family: inherit;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light);
}
.form-group textarea { resize: vertical; min-height: 80px; }
.range-wrap { display: flex; align-items: center; gap: 10px; }
.range-wrap input[type=range] { flex: 1; accent-color: var(--primary); }
.range-val { font-size: 14px; font-weight: 700; min-width: 36px; text-align: right; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 22px; }

/* ── 댓글 ── */
.comments-section { margin-top: 16px; border-top: 1px solid var(--border); padding-top: 14px; }
.comment-list { display: flex; flex-direction: column; gap: 10px; max-height: 200px; overflow-y: auto; margin-bottom: 10px; }
.comment-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
.comment-author { font-size: 11px; font-weight: 700; color: var(--text-light); margin-bottom: 4px; }
.comment-text { font-size: 13px; }
.comment-input-row { display: flex; gap: 8px; }
.comment-input-row input { flex: 1; padding: 8px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border); font-size: 13px; }

/* ── 음성 모달 ── */
.voice-area { text-align: center; padding: 20px 0; }
.voice-btn-big { width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer; font-size: 36px; display: flex; align-items: center; justify-content: center; margin: 0 auto 16px; transition: all .2s; }
.voice-btn-big.idle { background: var(--primary-light); color: #2d6e4a; }
.voice-btn-big.recording { background: var(--danger); color: #8b2020; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{transform:scale(1);} 50%{transform:scale(1.08);} }
.voice-transcript { background: var(--bg); border-radius: var(--radius-sm); padding: 14px; min-height: 80px; font-size: 13px; text-align: left; margin-bottom: 12px; white-space: pre-wrap; color: var(--text); }
.voice-status { font-size: 12px; color: var(--text-light); margin-bottom: 12px; }
.ai-result { background: var(--primary-light); border-radius: var(--radius-sm); padding: 14px; margin-top: 12px; text-align: left; }
.ai-result-title { font-size: 12px; font-weight: 700; color: #2d6e4a; margin-bottom: 8px; }
.ai-field { display: flex; gap: 8px; align-items: center; font-size: 12px; margin-bottom: 4px; }
.ai-field-label { color: var(--text-light); min-width: 60px; }

/* ── 알림 토스트 ── */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: #fff; border-radius: var(--radius-sm); box-shadow: 0 4px 20px rgba(0,0,0,.15); padding: 12px 18px; font-size: 13px; border-left: 4px solid; min-width: 240px; animation: slideIn .3s ease; }
.toast.success { border-color: var(--primary); }
.toast.error { border-color: var(--danger); }
.toast.warning { border-color: var(--warning-dark); }
@keyframes slideIn { from{transform:translateX(100%);opacity:0;} to{transform:translateX(0);opacity:1;} }

/* ── D-Day 알림 배너 ── */
.alert-banner { background: var(--warning); border: 1px solid var(--warning-dark); border-radius: var(--radius-sm); padding: 10px 16px; margin-bottom: 16px; display: flex; align-items: center; gap: 10px; font-size: 13px; }

/* ── 반응형 ── */
@media (max-width: 768px) {
  #sidebar { position: fixed; left: 0; top: 0; height: 100vh; transform: translateX(-100%); }
  #sidebar.mobile-open { transform: translateX(0); }
  #sidebar.collapsed { width: 220px; min-width: 220px; }
  #sidebar.collapsed .logo-text, #sidebar.collapsed .nav-label { display: block; }
  .mobile-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 99; }
  .mobile-overlay.show { display: block; }
  .form-grid { grid-template-columns: 1fr; }
  .stat-grid { grid-template-columns: repeat(2, 1fr); }
  .chart-grid { grid-template-columns: 1fr; }
  .content { padding: 16px; }
  .topbar { padding: 12px 16px; }
  .filter-bar input { min-width: 140px; }
}

/* ── 인쇄 ── */
@media print {
  #sidebar, .topbar-actions, .filter-bar .btn, #toast-container { display: none !important; }
  body { overflow: visible; }
  #main { overflow: visible; }
  .content { overflow: visible; }
  .task-table-wrap { box-shadow: none; }
  @page { margin: 15mm; }
}

/* ── 섹션 타이틀 ── */
.section-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; color: var(--text); display: flex; align-items: center; gap: 8px; }
.empty-state { text-align: center; padding: 48px; color: var(--text-light); }
.empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── 탭 ── */
.tab-bar { display: flex; gap: 4px; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; margin-bottom: 16px; width: fit-content; }
.tab { padding: 7px 16px; border-radius: 6px; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--text-light); transition: all .2s; }
.tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow); }

/* ── 파일 첨부 ── */
.attach-list { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
.attach-item { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: var(--bg); border-radius: var(--radius-sm); font-size: 12px; }
.attach-icon { font-size: 16px; }
.attach-name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.attach-del { cursor: pointer; color: var(--text-light); font-size: 14px; }
.attach-del:hover { color: #d04040; }

/* ── 태그 input ── */
.tag-input-wrap { display: flex; flex-wrap: wrap; gap: 6px; padding: 6px; border: 1px solid var(--border); border-radius: var(--radius-sm); min-height: 38px; align-items: center; cursor: text; }
.tag-input-wrap:focus-within { border-color: var(--primary); box-shadow: 0 0 0 2px var(--primary-light); }
.tag-input-wrap .badge-tag { cursor: default; }
.tag-input-inner { border: none; outline: none; font-size: 13px; flex: 1; min-width: 80px; }

/* ── 상세 모달 ── */
.detail-header { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
.detail-title { font-size: 18px; font-weight: 800; flex: 1; }
.detail-meta { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; margin-bottom: 16px; }
.detail-meta-item { background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; }
.detail-meta-label { font-size: 11px; color: var(--text-light); font-weight: 700; margin-bottom: 3px; }
.detail-meta-value { font-size: 13px; font-weight: 600; }

/* ── 완료율 progress ── */
.big-progress { margin: 12px 0; }
.big-progress-bar { height: 12px; background: var(--border); border-radius: 10px; overflow: hidden; }
.big-progress-fill { height: 100%; background: linear-gradient(90deg, var(--primary), #5ec48a); border-radius: 10px; transition: width .5s; }
.big-progress-label { font-size: 12px; color: var(--text-light); margin-top: 4px; }
</style>
</head>
<body>

<!-- ════ 로그인 화면 ════ -->
<div id="login-screen" style="display:none;position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:var(--radius);box-shadow:0 8px 40px rgba(50,100,70,.18);padding:48px 40px;text-align:center;max-width:380px;width:90%;">
    <div style="font-size:52px;margin-bottom:16px;">📋</div>
    <h2 style="font-size:22px;font-weight:800;margin-bottom:8px;color:var(--text);">업무 진행 현황표</h2>

auth.onAuthStateChanged(user => {

// ══════════════════════════════════════
//  Firestore 실시간 리스너
// ══════════════════════════════════════
function setupRealtimeListeners() {
  unsubscribers.forEach(fn => fn());
  unsubscribers = [];
  let loaded = { tasks: false, team: false, tags: false };

  let initialized = false;

  const check = () => {
    if (!loaded.tasks || !loaded.team || !loaded.tags) return;
    if (initialized) return;
    initialized = true;
    showView('dashboard');
  };

  unsubscribers.push(db.collection('tasks').onSnapshot(snap => {
    tasks = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    loaded.tasks = true;
    check();
    if (initialized) showView(currentView);
  }));
  unsubscribers.push(db.collection('team').onSnapshot(snap => {
    team = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    loaded.team = true;
    check();
  }));
  unsubscribers.push(db.collection('tags').onSnapshot(snap => {
    tags = snap.docs.map(d => ({ id: d.id, ...d.data() }));
    loaded.tags = true;
    check();
  }));
}

// ══════════════════════════════════════
//  Firestore CRUD (비동기)
// ══════════════════════════════════════
async function dbSet(col, id, data) {
  await db.collection(col).doc(id).set(data);
}
async function dbUpdate(col, id, data) {
  await db.collection(col).doc(id).update(data);
}
async function dbDelete(col, id) {
  await db.collection(col).doc(id).delete();
}

// ══════════════════════════════════════
//  뷰 라우터
// ══════════════════════════════════════
function showView(v) {
  currentView = v;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  const nav = document.getElementById('nav-'+v);
  if (nav) nav.classList.add('active');
  const titles = {dashboard:'대시보드',tasks:'업무 목록',gantt:'간트차트',calendar:'캘린더',team:'팀 관리',tags:'태그 관리'};
  document.getElementById('topbar-title').textContent = titles[v] || '';
  Object.values(charts).forEach(c => { try{ c.destroy(); }catch(e){} });
  charts = {};
  const content = document.getElementById('content');
  if (v==='dashboard') renderDashboard(content);
  else if (v==='tasks') renderTasks(content);
  else if (v==='gantt') renderGantt(content);
  else if (v==='calendar') renderCalendar(content);
  else if (v==='team') renderTeam(content);
  else if (v==='tags') renderTagsView(content);
  closeMobileMenu();
}

// ══════════════════════════════════════
//  대시보드
// ══════════════════════════════════════
function renderDashboard(el) {
  const today = new Date(); today.setHours(0,0,0,0);
  const total = tasks.length;
  const doing = tasks.filter(t=>t.status==='진행중').length;
  const done = tasks.filter(t=>t.status==='완료').length;
  const late = tasks.filter(t=>t.status!=='완료'&&t.end&&new Date(t.end)<today).length;
  const review = tasks.filter(t=>t.status==='검토중').length;
  const avgProg = total ? Math.round(tasks.reduce((a,t)=>a+t.progress,0)/total) : 0;

  // D-Day 알림
  const upcoming = tasks.filter(t=>t.status!=='완료'&&t.end).map(t=>{
    const diff = Math.ceil((new Date(t.end)-today)/(1000*60*60*24));
    return {...t,diff};
  }).filter(t=>t.diff>=0&&t.diff<=3).sort((a,b)=>a.diff-b.diff);

  let alertHtml = '';
  if (late>0||upcoming.length>0) {
    alertHtml = `<div class="alert-banner">⚠️ `;
    if (late>0) alertHtml += `<strong>기한 초과 ${late}건</strong>`;
    if (late>0&&upcoming.length>0) alertHtml += ' · ';
    if (upcoming.length>0) alertHtml += `마감 임박: ${upcoming.map(t=>`<strong>${t.title}</strong> (D-${t.diff})`).join(', ')}`;
    alertHtml += `</div>`;
  }

  el.innerHTML = `
    ${alertHtml}
    <div class="stat-grid">
      <div class="stat-card total"><div class="stat-label">전체 업무</div><div class="stat-value">${total}</div><div class="stat-sub">평균 진행률 ${avgProg}%</div></div>
      <div class="stat-card doing"><div class="stat-label">진행중</div><div class="stat-value">${doing}</div><div class="stat-sub">전체의 ${total?Math.round(doing/total*100):0}%</div></div>
      <div class="stat-card done"><div class="stat-label">완료</div><div class="stat-value">${done}</div><div class="stat-sub">완료율 ${total?Math.round(done/total*100):0}%</div></div>
      <div class="stat-card review"><div class="stat-label">검토중</div><div class="stat-value">${review}</div></div>
      <div class="stat-card late"><div class="stat-label">기한 초과</div><div class="stat-value">${late}</div><div class="stat-sub">즉시 확인 필요</div></div>
    </div>
    <div class="chart-grid">
      <div class="chart-card"><div class="chart-title">📊 상태별 현황</div><div class="chart-wrap"><canvas id="chart-status"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">🎯 우선순위 분포</div><div class="chart-wrap"><canvas id="chart-priority"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">📁 카테고리별 업무</div><div class="chart-wrap"><canvas id="chart-category"></canvas></div></div>
      <div class="chart-card"><div class="chart-title">👤 담당자별 업무</div><div class="chart-wrap"><canvas id="chart-assignee"></canvas></div></div>
    </div>
    <div class="section-title">🔥 진행중 업무</div>
    <div class="task-table-wrap">${buildTable(tasks.filter(t=>t.status==='진행중'),true)}</div>
  `;
  buildCharts();
}

function buildCharts() {
  const statusData = ['대기','진행중','검토중','완료'].map(s=>tasks.filter(t=>t.status===s).length);
  const prioData = ['낮음','보통','높음','긴급'].map(p=>tasks.filter(t=>t.priority===p).length);
  const cats = [...new Set(tasks.map(t=>t.category))];
  const catData = cats.map(c=>tasks.filter(t=>t.category===c).length);
  const members = team.map(m=>({name:m.name,count:tasks.filter(t=>t.assignee===m.id).length}));

  const pastel = ['#b8d8f5','#a8d8b9','#f9e4b7','#d4f0de'];
  const pastel2 = ['#d4eff8','#a8d8b9','#f5c6d0','#f5b8b8'];

  const def = (id,type,labels,data,colors,opts={}) => {
    const ctx = document.getElementById(id);
    if(!ctx) return;
    charts[id] = new Chart(ctx, {
      type, data:{labels,datasets:[{data,backgroundColor:colors,borderWidth:0,borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'right',labels:{font:{size:11},boxWidth:12}}}, ...opts}
    });
  };
  def('chart-status','doughnut',['대기','진행중','검토중','완료'],statusData,pastel);
  def('chart-priority','doughnut',['낮음','보통','높음','긴급'],prioData,['#e8f0e8','#b8d8f5','#f5c6d0','#f5b8b8']);
  def('chart-category','bar',cats,catData,cats.map((_,i)=>pastel[i%pastel.length]),{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}});
  def('chart-assignee','bar',members.map(m=>m.name),members.map(m=>m.count),members.map(m=>m.name).map((_,i)=>pastel2[i%pastel2.length]),{plugins:{legend:{display:false}},scales:{y:{beginAtZero:true,ticks:{stepSize:1}}}});
}

function filteredTasks() {
  return tasks.filter(t => {
    if (filterStatus && t.status!==filterStatus) return false;
    if (filterPriority && t.priority!==filterPriority) return false;
    if (filterAssignee && t.assignee!==filterAssignee) return false;
    if (filterCategory && t.category!==filterCategory) return false;
    if (filterSearch && !t.title.toLowerCase().includes(filterSearch.toLowerCase())) return false;
    return true;
  });
}
function resetFilters() {
  filterStatus=filterPriority=filterAssignee=filterCategory=filterSearch='';
  renderTasks(document.getElementById('content'));
}

function buildTable(list, compact=false) {
  if (!list.length) return `<div class="empty-state"><div class="empty-icon">📭</div><div>표시할 업무가 없습니다</div></div>`;
  const today = new Date(); today.setHours(0,0,0,0);
  const statusBadge = s => ({대기:'badge-wait',진행중:'badge-doing',검토중:'badge-review',완료:'badge-done'}[s]||'badge-wait');
  const prioBadge = p => ({낮음:'badge-low',보통:'badge-normal',높음:'badge-high',긴급:'badge-urgent'}[p]||'badge-normal');
  const memberName = id => { const m=team.find(t=>t.id===id); return m?m.name:'-'; };
  const dday = end => {
    if (!end) return '';
    const diff = Math.ceil((new Date(end)-today)/(1000*60*60*24));
    if (diff<0) return `<span class="dday dday-late">D+${Math.abs(diff)}</span>`;
    if (diff===0) return `<span class="dday dday-today">D-Day</span>`;
    if (diff<=3) return `<span class="dday dday-soon">D-${diff}</span>`;
    return `<span class="dday dday-ok">D-${diff}</span>`;
  };
  return `<table>
    <thead><tr>
      <th>업무명</th><th>담당자</th><th>카테고리</th><th>상태</th><th>우선순위</th>
      <th>진행률</th><th>마감일</th>${!compact?'<th>태그</th>':''}<th>액션</th>
    </tr></thead>
    <tbody>
      ${list.map(t=>`<tr>
        <td><a href="#" onclick="openDetail('${t.id}');return false;" style="color:var(--text);text-decoration:none;font-weight:600;">${t.title}</a></td>
        <td>${memberName(t.assignee)}</td>
        <td>${t.category}</td>
        <td><span class="badge ${statusBadge(t.status)}">${t.status}</span></td>
        <td><span class="badge ${prioBadge(t.priority)}">${t.priority}</span></td>
        <td>
          <div style="display:flex;align-items:center;gap:6px;">
            <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${t.progress}%"></div></div>
            <span style="font-size:11px;color:var(--text-light)">${t.progress}%</span>
          </div>
        </td>
        <td>${t.end?t.end.substring(5):'-'} ${dday(t.end)}</td>
        ${!compact?`<td>${(t.tags||[]).map(tgId=>{const tg=tags.find(x=>x.id===tgId);return tg?`<span class="badge badge-tag" style="background:${tg.color}20;color:${tg.color};">${tg.name}</span>`:''}).join(' ')}</td>`:''}
        <td>
          <button class="btn-icon" style="font-size:13px;" onclick="openEditTask('${t.id}')">✏️</button>
          <button class="btn-icon" style="font-size:13px;" onclick="deleteTask('${t.id}')">🗑️</button>
        </td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

// ══════════════════════════════════════
//  간트차트
// ══════════════════════════════════════
function renderGantt(el) {
  const today = new Date(); today.setHours(0,0,0,0);
  const dates = tasks.filter(t=>t.start&&t.end).flatMap(t=>[new Date(t.start),new Date(t.end)]);
  let start = dates.length ? new Date(Math.min(...dates)) : new Date();
  let end = dates.length ? new Date(Math.max(...dates)) : new Date(today.getTime()+30*86400000);
  // 범위 여유 추가
  start.setDate(start.getDate()-2);
  end.setDate(end.getDate()+5);

  const days = [];
  for (let d=new Date(start); d<=end; d.setDate(d.getDate()+1)) days.push(new Date(d));
  const totalDays = days.length;
  const memberName = id => { const m=team.find(t=>t.id===id); return m?m.name:'-'; };
  const barColors = {개발:'#a8d8b9',디자인:'#f5c6d0',기획:'#c5b8e8',QA:'#f9e4b7',마케팅:'#b8d8f5',운영:'#f5b8a0',미팅:'#d4f0de',기타:'#e0e0e0'};

  const dayCols = days.map(d=>{
    const isToday = d.toDateString()===today.toDateString();
    return `<div class="gantt-day${isToday?' today':''}">${d.getMonth()+1}/${d.getDate()}<br><span style="font-size:9px">${['일','월','화','수','목','금','토'][d.getDay()]}</span></div>`;
  }).join('');

  const rows = tasks.filter(t=>t.start&&t.end).map(t=>{
    const s = new Date(t.start), e = new Date(t.end);
    const left = Math.max(0,(s-start)/86400000/totalDays*100);
    const width = Math.max(0.5,(e-s)/86400000/totalDays*100+(1/totalDays*100));
    const color = barColors[t.category]||'#a8d8b9';
    return `<div class="gantt-row">
      <div class="gantt-task-name">
        <span style="width:8px;height:8px;border-radius:50%;background:${color};flex-shrink:0;display:inline-block;"></span>
        <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.title}</span>
      </div>
      <div class="gantt-timeline">
        <div class="gantt-bar" style="left:${left}%;width:${width}%;background:${color};color:${t.category==='기획'?'#4a3070':'#2d5e3e'};" onclick="openDetail('${t.id}')" title="${t.title} (${t.start}~${t.end})">
          ${width>8?t.title:''}
        </div>
      </div>
    </div>`;
  }).join('');

  // 오늘 선
  const todayLeft = (today-start)/86400000/totalDays*100;

  el.innerHTML = `
    <div class="section-title">📅 간트차트 <span style="font-size:12px;font-weight:400;color:var(--text-light)">(업무 바 클릭 시 상세보기)</span></div>
    <div class="gantt-wrap" style="position:relative;">
      <div class="gantt-header">
        <div class="gantt-task-col">업무명</div>
        <div class="gantt-days">${dayCols}</div>
      </div>
      <div style="position:relative;">
        ${rows||'<div style="padding:32px;text-align:center;color:var(--text-light)">시작일/마감일이 설정된 업무가 없습니다</div>'}
        ${todayLeft>=0&&todayLeft<=100?`<div style="position:absolute;top:0;bottom:0;left:calc(200px + ${todayLeft}%);width:2px;background:#e55;opacity:.5;pointer-events:none;z-index:10;"></div>`:''}
      </div>
    </div>
  `;
}

function renderCalendar(el) {
  const y = calendarDate.getFullYear(), m = calendarDate.getMonth();
  const firstDay = new Date(y,m,1).getDay();
  const lastDate = new Date(y,m+1,0).getDate();
  const today = new Date(); today.setHours(0,0,0,0);
  const barColors = {개발:'#a8d8b9',디자인:'#f5c6d0',기획:'#c5b8e8',QA:'#f9e4b7',마케팅:'#b8d8f5',운영:'#f5b8a0',미팅:'#d4f0de',기타:'#e0e0e0'};

  let cells = '';
  // 빈칸
  for (let i=0;i<firstDay;i++) cells += `<div class="cal-cell other-month"></div>`;
  for (let d=1;d<=lastDate;d++) {
    const dt = new Date(y,m,d); dt.setHours(0,0,0,0);
    const dtStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dt.toDateString()===today.toDateString();
    const dayTasks = tasks.filter(t=>t.start&&t.end&&t.start<=dtStr&&t.end>=dtStr);
    const isSun = dt.getDay()===0, isSat = dt.getDay()===6;
    cells += `<div class="cal-cell${isToday?' today':''}">
      <div class="cal-date" style="color:${isSun?'#d04040':isSat?'#4060d0':'var(--text)'}">${d}</div>
      ${dayTasks.slice(0,3).map(t=>`<div class="cal-task-item" style="background:${barColors[t.category]||'#e0e0e0'}40;color:var(--text);" onclick="openDetail('${t.id}')" title="${t.title}">${t.title}</div>`).join('')}
      ${dayTasks.length>3?`<div style="font-size:10px;color:var(--text-light)">+${dayTasks.length-3}건</div>`:''}
    </div>`;
  }

  el.innerHTML = `
    <div class="calendar-nav">
      <button class="btn btn-ghost btn-sm" onclick="calendarDate.setMonth(calendarDate.getMonth()-1);showView('calendar')">◀</button>
      <h3>${y}년 ${m+1}월</h3>
      <button class="btn btn-ghost btn-sm" onclick="calendarDate.setMonth(calendarDate.getMonth()+1);showView('calendar')">▶</button>
      <button class="btn btn-ghost btn-sm" onclick="calendarDate=new Date();showView('calendar')">오늘</button>
    </div>
    <div class="card">
      <div class="calendar-grid">
        ${['일','월','화','수','목','금','토'].map((d,i)=>`<div class="cal-day-header" style="${i===0?'color:#d04040':i===6?'color:#4060d0':''}">${d}</div>`).join('')}
        ${cells}
      </div>
    </div>
  `;
}

function openAddTask(prefill={}) {
  editingId = null;
  taskTags = prefill.tags||[];
  taskAttachments = prefill.attachments||[];
  document.getElementById('task-modal-title').textContent = '업무 추가';
  document.getElementById('f-title').value = prefill.title||'';
  document.getElementById('f-desc').value = prefill.desc||'';
  document.getElementById('f-status').value = prefill.status||'대기';
  document.getElementById('f-priority').value = prefill.priority||'보통';
  document.getElementById('f-progress').value = prefill.progress||0;
  document.getElementById('f-progress-val').textContent = (prefill.progress||0)+'%';
  document.getElementById('f-start').value = prefill.start||today();
  document.getElementById('f-end').value = prefill.end||'';
  fillAssigneeSelect(prefill.assignee||'');
  renderTaskTagBadges();
  renderAttachList();
  const catEl = document.getElementById('f-category');
  if (prefill.category) catEl.value = prefill.category;
  openModal('task-modal');
}
function openEditTask(id) {
  const t = tasks.find(x=>x.id===id);
  if (!t) return;
  editingId = id;
  taskTags = [...(t.tags||[])];
  taskAttachments = [...(t.attachments||[])];
  document.getElementById('task-modal-title').textContent = '업무 수정';
  document.getElementById('f-title').value = t.title;
  document.getElementById('f-desc').value = t.desc||'';
  document.getElementById('f-status').value = t.status;
  document.getElementById('f-priority').value = t.priority;
  document.getElementById('f-progress').value = t.progress;
  document.getElementById('f-progress-val').textContent = t.progress+'%';
  document.getElementById('f-start').value = t.start||'';
  document.getElementById('f-end').value = t.end||'';
  fillAssigneeSelect(t.assignee);
  document.getElementById('f-category').value = t.category;
  renderTaskTagBadges();
  renderAttachList();
  openModal('task-modal');
}
function fillAssigneeSelect(selected) {
  const el = document.getElementById('f-assignee');
  el.innerHTML = `<option value="">담당자 선택</option>${team.map(m=>`<option value="${m.id}"${m.id===selected?' selected':''}>${m.name}</option>`).join('')}`;
}
async function saveTask() {
  const title = document.getElementById('f-title').value.trim();
  if (!title) { toast('업무명을 입력하세요','error'); return; }
  const taskId = editingId || uid();
  const existing = editingId ? tasks.find(x=>x.id===editingId) : null;
  const t = {
    id: taskId, title,
    assignee: document.getElementById('f-assignee').value,
    category: document.getElementById('f-category').value,
    status: document.getElementById('f-status').value,
    priority: document.getElementById('f-priority').value,
    start: document.getElementById('f-start').value,
    end: document.getElementById('f-end').value,
    progress: parseInt(document.getElementById('f-progress').value),
    desc: document.getElementById('f-desc').value,

function handleTagInput(e) {
  if (e.key==='Enter'||e.key===',') {
    e.preventDefault();
    const val = e.target.value.trim().replace(/,/g,'');
    if (!val) return;
    // 기존 태그 찾기 또는 생성
    let tg = tags.find(t=>t.name===val);
    if (!tg) { tg={id:uid(),name:val,color:'#c5b8e8'}; tags.push(tg); save(); }
    if (!taskTags.includes(tg.id)) { taskTags.push(tg.id); renderTaskTagBadges(); }
    e.target.value='';
  } else if (e.key==='Backspace'&&!e.target.value&&taskTags.length) {
    taskTags.pop(); renderTaskTagBadges();
  }
}
function renderTaskTagBadges() {
  const wrap = document.getElementById('tag-input-wrap');
  const inner = document.getElementById('tag-inner');
  wrap.querySelectorAll('.badge-tag').forEach(el=>el.remove());
  taskTags.forEach(id=>{
    const tg=tags.find(t=>t.id===id);
    if(!tg) return;
    const span=document.createElement('span');
    span.className='badge badge-tag';
    span.style.background=tg.color+'30'; span.style.color=tg.color;
    span.textContent=tg.name+' ✕';
    span.onclick=()=>{taskTags=taskTags.filter(x=>x!==id);renderTaskTagBadges();};
    wrap.insertBefore(span,inner);
  });
}

      <div class="detail-meta-item"><div class="detail-meta-label">마감일</div><div class="detail-meta-value">${t.end||'-'} <strong>${ddayStr}</strong></div></div>

    ${(t.attachments||[]).length?`<div class="divider"></div><div class="section-title" style="font-size:13px;">📎 첨부파일</div><div class="attach-list">${t.attachments.map(a=>`<div class="attach-item"><span>📎</span><span class="attach-name">${a.url?`<a href="${a.url}" target="_blank">${a.name}</a>`:a.name}</span></div>`).join('')}</div>`:''}

async function addComment(taskId) {
  const input=document.getElementById(`comment-input-${taskId}`);
  const text=input.value.trim();
  if(!text) return;
  const t=tasks.find(x=>x.id===taskId);
  if(!t) return;
  const comments=[...(t.comments||[]),{id:uid(),author:currentUser?.displayName||'나',text,date:today()}];
  await dbUpdate('tasks', taskId, {comments});
  input.value='';
  const list=document.getElementById(`comment-list-${taskId}`);
  list.innerHTML=comments.map(c=>`<div class="comment-item"><div class="comment-author">${c.author} · ${c.date}</div><div class="comment-text">${c.text}</div></div>`).join('');
  list.scrollTop=list.scrollHeight;

// ══════════════════════════════════════
//  음성 인식 (Web Speech API)
// ══════════════════════════════════════
function openVoiceModal() {
  voiceTranscript=''; voiceAIResult=null; isRecording=false;
  document.getElementById('voice-transcript').textContent='📝 음성 내용이 여기에 표시됩니다...';
  document.getElementById('voice-status').textContent='버튼을 눌러 말씀하세요';
  document.getElementById('voice-btn').className='voice-btn-big idle';
  document.getElementById('voice-btn').textContent='🎙️';
  document.getElementById('ai-result-area').innerHTML='';
  document.getElementById('voice-register-btn').style.display='none';

  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){
    document.getElementById('voice-status').textContent='❌ 이 브라우저는 음성인식을 지원하지 않습니다 (Chrome 권장)';
  }
  openModal('voice-modal');
}
function closeVoiceModal() {
  if(isRecording&&voiceRecognition) voiceRecognition.stop();
  isRecording=false; closeModal('voice-modal');
}
function toggleVoice() {
  if(isRecording) stopVoice();
  else startVoice();
}
function startVoice() {
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('음성인식을 지원하지 않는 브라우저입니다','error');return;}
  voiceRecognition=new SR();
  voiceRecognition.lang='ko-KR';
  voiceRecognition.continuous=true;
  voiceRecognition.interimResults=true;
  voiceRecognition.onstart=()=>{
    isRecording=true;
    document.getElementById('voice-btn').className='voice-btn-big recording';
    document.getElementById('voice-btn').textContent='⏹️';
    document.getElementById('voice-status').textContent='🔴 녹음 중... 말씀하세요';
  };
  voiceRecognition.onresult=e=>{
    let interim='', final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal) final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    if(final) voiceTranscript+=final;
    document.getElementById('voice-transcript').textContent=(voiceTranscript+interim)||'...';
  };
  voiceRecognition.onerror=e=>{ toast('음성인식 오류: '+e.error,'error'); stopVoice(); };
  voiceRecognition.onend=()=>{ if(isRecording) stopVoice(); };
  voiceRecognition.start();
}
function stopVoice() {
  isRecording=false;
  if(voiceRecognition) voiceRecognition.stop();
  document.getElementById('voice-btn').className='voice-btn-big idle';
  document.getElementById('voice-btn').textContent='🎙️';
  document.getElementById('voice-status').textContent='분석 중...';
  setTimeout(()=>{
    if(voiceTranscript.trim()){
      voiceAIResult=analyzeText(voiceTranscript);
      renderAIResult();
      document.getElementById('voice-status').textContent='✅ 분석 완료! 결과를 확인하세요';
      document.getElementById('voice-register-btn').style.display='';
    } else {
      document.getElementById('voice-status').textContent='내용이 감지되지 않았습니다. 다시 시도해주세요.';
    }
  }, 300);
}

// ══════════════════════════════════════
//  AI 키워드 분석
// ══════════════════════════════════════
function analyzeText(text) {
  const t = text.toLowerCase();
  // 카테고리
  const catMap = {
    '개발': ['개발','코딩','코드','프로그램','기능','버그','api','서버','db','데이터베이스','구현','배포','인프라','모듈','클래스','함수'],
    '디자인': ['디자인','ui','ux','화면','레이아웃','색상','폰트','아이콘','이미지','그래픽','와이어프레임','프로토타입'],
    '기획': ['기획','계획','전략','분석','요구사항','정책','프로세스','방향','목표','로드맵','기능정의'],
    'QA': ['테스트','qa','검수','검토','오류','버그','이슈','수정','확인','품질'],
    '마케팅': ['마케팅','광고','홍보','캠페인','sns','콘텐츠','브랜딩','이벤트','프로모션'],
    '운영': ['운영','관리','모니터링','서비스','유지','보수','인프라','배포'],
    '미팅': ['회의','미팅','미팅','협의','논의','발표','보고','스탠드업','킥오프','브리핑'],
  };
  let category='기타', maxScore=0;
  for(const [cat,kws] of Object.entries(catMap)){
    const score=kws.filter(k=>t.includes(k)).length;
    if(score>maxScore){maxScore=score;category=cat;}
  }
  // 우선순위
  let priority='보통';
  if(['긴급','즉시','바로','지금','당장','빨리','급함','오늘까지','오늘 중'].some(k=>t.includes(k))) priority='긴급';
  else if(['중요','우선','빠르게','이번 주','중요한'].some(k=>t.includes(k))) priority='높음';
  else if(['나중에','여유','천천히','다음에','다음 달'].some(k=>t.includes(k))) priority='낮음';
  // 담당자
  let assignee='';
  for(const m of team){
    if(t.includes(m.name.toLowerCase())||t.includes(m.name)){assignee=m.id;break;}
  }
  // 마감일
  let end='';
  const todayDt=new Date();
  if(t.includes('내일')) end=dateStr(1);
  else if(t.includes('모레')) end=dateStr(2);
  else if(t.includes('이번 주')||t.includes('이번주')||t.includes('금요일')) {
    const d=new Date(); const day=d.getDay(); end=dateStr(5-day<0?7-(day-5):5-day);
  } else if(t.includes('다음 주')||t.includes('다음주')) end=dateStr(7+(5-todayDt.getDay()));
  else if(t.includes('이번 달 말')||t.includes('월말')) { const d=new Date(todayDt.getFullYear(),todayDt.getMonth()+1,0); end=d.toISOString().split('T')[0]; }
  // 제목 추출 (첫 문장 또는 앞 20자)
  const sentences=text.split(/[.!?。]/);
  const title=(sentences[0]||text).trim().substring(0,40)||text.substring(0,40);
  return {title, category, priority, assignee, end, desc:text};
}
function dateStr(offset){ const d=new Date(); d.setDate(d.getDate()+offset); return d.toISOString().split('T')[0]; }

function renderAIResult() {
  if(!voiceAIResult) return;
  const r=voiceAIResult;
  const memberName=id=>{const m=team.find(t=>t.id===id);return m?m.name:'(자동감지안됨)';};
  document.getElementById('ai-result-area').innerHTML=`
    <div class="ai-result">
      <div class="ai-result-title">🤖 AI 분석 결과</div>
      <div class="ai-field"><span class="ai-field-label">업무명</span><strong>${r.title}</strong></div>
      <div class="ai-field"><span class="ai-field-label">카테고리</span><span class="badge badge-doing">${r.category}</span></div>
      <div class="ai-field"><span class="ai-field-label">우선순위</span><span class="badge ${r.priority==='긴급'?'badge-urgent':r.priority==='높음'?'badge-high':'badge-normal'}">${r.priority}</span></div>
      <div class="ai-field"><span class="ai-field-label">담당자</span>${r.assignee?memberName(r.assignee):'(미감지)'}</div>
      <div class="ai-field"><span class="ai-field-label">마감일</span>${r.end||'(미감지)'}</div>
    </div>`;
}
function registerFromVoice() {
  if(!voiceAIResult) return;
  closeVoiceModal();
  openAddTask({...voiceAIResult, start:today(), tags:[], attachments:[]});
  toast('분석된 내용으로 업무 양식을 채웠습니다. 확인 후 저장하세요');
}
